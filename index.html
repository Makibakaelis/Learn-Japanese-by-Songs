<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>J-Pop Music Player</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; margin: 0; height: 100vh; }
        #sidebar { width: 300px; background: #1f1f1f; padding: 20px; overflow-y: auto; border-right: 1px solid #333; display: flex; flex-direction: column; }
        #main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        
        /* Giao diện Ô tìm kiếm */
        #search-input {
            width: 100%;
            padding: 10px 12px;
            background: #282828;
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
            box-sizing: border-box; /* Chống tràn viền sidebar */
            transition: border-color 0.2s;
        }
        #search-input:focus {
            outline: none;
            border-color: #1db954; /* Đổi sang viền xanh Spotify khi gõ */
        }

        #playlist { flex: 1; overflow-y: auto; }
        .song-item { padding: 10px; background: #282828; margin-bottom: 10px; cursor: pointer; border-radius: 4px; transition: background 0.2s; }
        .song-item:hover { background: #3e3e3e; }
        .song-item.active { background: #1db954; color: black; font-weight: bold; }
        
        #lyric-container { flex: 1; overflow-y: auto; text-align: center; padding: 20px; background: #181818; border-radius: 8px; margin-bottom: 20px; }
        .lyric-block { margin-bottom: 25px; }
        .kanji { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 4px; }
        .reading { font-size: 14px; color: #aaa; margin-bottom: 6px; }
        .meaning { font-size: 15px; color: #1db954; font-style: italic; }
        
        #player-controls { display: flex; align-items: center; gap: 15px; background: #1f1f1f; padding: 15px; border-radius: 8px; }
        audio { flex: 1; }
        
        #shuffle-btn { 
            padding: 12px 20px; 
            background: #282828; 
            color: #b3b3b3; 
            border: 1px solid #444; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        #shuffle-btn:hover { transform: scale(1.05); color: white; }
        #shuffle-btn.active { background: #1db954; color: black; border-color: #1db954; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Danh sách bài hát</h3>
        <input type="text" id="search-input" placeholder="🔍 Tìm tên bài hát, ca sĩ..." oninput="renderPlaylistVisual()">
        <div id="playlist">Đang tải danh sách...</div>
    </div>

    <div id="main-content">
        <h2 id="playing-title">Chọn một bài hát để bắt đầu</h2>
        
        <div id="lyric-container">
            <p style="color: #666; margin-top: 100px;">Lời bài hát sẽ hiển thị ở đây</p>
        </div>

        <div id="player-controls">
            <audio id="audio-player" controls></audio>
            <button id="shuffle-btn" onclick="toggleShuffle()">🔀 Ngẫu nhiên: TẮT</button>
        </div>
    </div>

    <script>
        const audioPlayer = document.getElementById('audio-player');
        const lyricContainer = document.getElementById('lyric-container');
        const playingTitle = document.getElementById('playing-title');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const searchInput = document.getElementById('search-input');

        let allSongs = [];       
        let currentIndex = -1;   
        let isShuffle = false;   

        function toggleShuffle() {
            isShuffle = !isShuffle;
            if (isShuffle) {
                shuffleBtn.innerText = "🔀 Ngẫu nhiên: BẬT";
                shuffleBtn.classList.add('active');
            } else {
                shuffleBtn.innerText = "🔀 Ngẫu nhiên: TẮT";
                shuffleBtn.classList.remove('active');
            }
        }

        async function loadPlaylist() {
            try {
                const response = await fetch('http://localhost:5000/api/playlist');
                allSongs = await response.json();
                renderPlaylistVisual();
            } catch (err) {
                document.getElementById('playlist').innerText = "Không thể kết nối đến Server Node.js!";
            }
        }

        // HÀM VẼ DANH SÁCH CÓ TÍCH HỢP BỘ LỌC TÌM KIẾM THÔNG MINH
        function renderPlaylistVisual() {
            const playlistDiv = document.getElementById('playlist');
            playlistDiv.innerHTML = '';

            // Lấy từ khóa bạn gõ và chuyển thành chữ thường để so sánh không phân biệt hoa thường
            const keyword = searchInput.value.toLowerCase().trim();

            allSongs.forEach((song, index) => {
                // Tách lấy tên file mp3 từ đường dẫn URL (Ví dụ: "gira-gira.mp3")
                const mp3FileName = song.audioUrl.split('/').pop().toLowerCase();

                // Kiểm tra xem từ khóa có nằm trong: Tên bài, Tên ca sĩ, hoặc Tên file MP3 không
                const isTitleMatch = song.title.toLowerCase().includes(keyword);
                const isArtistMatch = song.artist.toLowerCase().includes(keyword);
                const isFileMatch = mp3FileName.includes(keyword);

                // Nếu có gõ từ khóa nhưng KHÔNG khớp với bất kỳ điều kiện nào ➔ Ẩn bài hát đó đi
                if (keyword !== "" && !isTitleMatch && !isArtistMatch && !isFileMatch) {
                    return; 
                }

                const item = document.createElement('div');
                item.className = `song-item ${index === currentIndex ? 'active' : ''}`;
                item.innerHTML = `<strong>${song.title}</strong><br><small>${song.artist}</small>`;
                
                item.onclick = () => {
                    currentIndex = index;
                    playSong(song);
                };
                playlistDiv.appendChild(item);
            });

            // Nếu không tìm thấy bài nào thì hiển thị thông báo trống
            if (playlistDiv.innerHTML === '') {
                playlistDiv.innerHTML = `<p style="color: #666; text-align: center; font-size: 14px; margin-top: 20px;">Không tìm thấy bài hát nào phù hợp</p>`;
            }
        }

        function playSong(song) {
            playingTitle.innerText = `${song.title} - ${song.artist}`;
            audioPlayer.src = song.audioUrl;
            audioPlayer.play();

            renderPlaylistVisual();

            lyricContainer.innerHTML = '';
            song.lyrics.forEach((line, index) => {
                const block = document.createElement('div');
                block.className = 'lyric-block';
                block.innerHTML = `
                    <div class="kanji">${line.kanji || ''}</div>
                    <div class="reading">${line.reading || ''}</div>
                    <div class="meaning">${line.translate || ''}</div>
                `;
                lyricContainer.appendChild(block);
            });
            lyricContainer.scrollTop = 0; 
        }

        audioPlayer.onended = () => {
            if (allSongs.length === 0) return;

            if (isShuffle) {
                let randomIndex = Math.floor(Math.random() * allSongs.length);
                if (allSongs.length > 1) {
                    while (randomIndex === currentIndex) {
                        randomIndex = Math.floor(Math.random() * allSongs.length);
                    }
                }
                currentIndex = randomIndex;
            } else {
                currentIndex = (currentIndex + 1) % allSongs.length;
            }

            playSong(allSongs[currentIndex]);
        };

        loadPlaylist();
    </script>
</body>
</html>
